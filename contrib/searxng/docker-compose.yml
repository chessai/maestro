# Minimal self-hosted SearXNG for maestro's `search.backend = "searxng"` path
# (ADR-005). Runs a local metasearch instance whose JSON API the daemon's
# SearxngBackend calls at `{endpoint}/search?q=...&format=json`.
#
#   cd contrib/searxng && docker compose up -d     # or: podman compose up -d
#
# Then in ~/.config/maestro/config.toml, on the profile you want:
#   search.backend  = "searxng"
#   search.endpoint = "http://127.0.0.1:8888"
#
# Bound to localhost only. For a WireGuard/VPN-reachable box, publish on the
# tunnel interface instead and point `search.endpoint` at that address.

services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: maestro-searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      # Base URL SearXNG advertises; keep in sync with the published port.
      - SEARXNG_BASE_URL=http://127.0.0.1:8888/
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
